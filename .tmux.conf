# zsh
set -g default-command "${SHELL}"

# macOS only
set -g mouse on
bind-key -T root MouseDown1Status select-window -t=
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
bind -T copy-mode-vi C-WheelUpPane send-keys -X halfpage-up
bind -T copy-mode-vi C-WheelDownPane send-keys -X halfpage-down
bind -T copy-mode-emacs C-WheelUpPane send-keys -X halfpage-up
bind -T copy-mode-emacs C-WheelDownPane send-keys -X halfpage-down

# To copy, left click and drag to highlight text,
# once you release left click text will disappear and will automatically be available in clipboard
# Use vim keybindings in copy mode
setw -g mode-keys vi
# Update default binding of `Enter` to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# refresh
bind r source-file ~/.tmux.conf

# resize pane
bind -r h resize-pane -L
bind -r j resize-pane -D
bind -r k resize-pane -U
bind -r l resize-pane -R
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# split pane
bind-key v split-window -h -c '#{pane_current_path}'
bind-key b split-window -c '#{pane_current_path}'
bind-key c new-window -c '#{pane_current_path}'

# window switching
# Custom repeat time for window switching (default is 500ms)
set-option -g repeat-time 1000
bind-key -r Tab next-window
bind-key -r BTab previous-window

# styling — Witch Hazel Hypercolor
# palette reference: ~/code/witchhazel/ghostty/Witch Hazel Hypercolor
#   bg=#282634  bar-bg=#3B364E  lavender=#DCC8FF  pink=#FFB8D1  cyan=#1Bc5E0  fg=#F8F8F2

set -g default-terminal "tmux-256color"

# Enable OSC 8 hyperlinks for all terminals
set -ga terminal-features "*:hyperlinks"
set -as terminal-overrides ',*:Tc'

# Allow passthrough of escape sequences
set -g allow-passthrough on

# Set window titles from shell prompt
set -g set-titles on
set -g set-titles-string '#{pane_current_path}'

# Destroy session when last window is closed
set -g detach-on-destroy off

# Exit tmux when the last session is killed
set -g exit-empty on

# copy-mode selection
set -g mode-style "bg=#1Bc5E0,fg=#282634"

# pane border
set -g pane-border-style fg='#3B364E'
set -g pane-active-border-style fg='#FFB8D1'

# message text
set -g message-style bg='#3B364E',fg='#1Bc5E0'

set -g status-style bg='#3B364E',fg='#DCC8FF'
set -g status-interval 1

# window status
set-window-option -g window-status-style fg='#DCC8FF',bg=default
set-window-option -g window-status-current-style fg='#FFB8D1',bg='#282634'

set -g window-status-current-format "#[fg=#3B364E]#[bg=#DCC8FF]#[fg=#282634]#[bg=#DCC8FF] #I #{s|$HOME|~|:pane_current_path}:#{pane_current_command} #[fg=#DCC8FF]#[bg=#3B364E]"
set -g window-status-format "#[fg=#DCC8FF]#[bg=#3B364E]#I #{s|$HOME|~|:pane_current_path}:#{pane_current_command} #[fg=#3B364E] "

# status right
set -g status-right ''
